<section class="gallery-cinematic">
    <div class="cinematic-badge">MOMENTOS INOLVIDABLES</div>
    <h2 class="cinematic-title">Galería de Recuerdos</h2>
    <p class="cinematic-subtitle">CADA IMAGEN CUENTA UNA HISTORIA</p>

    <div class="gallery-grid">
        <div class="gallery-card">
            <img src="1.jpg" alt="Recuerdo 1">
            <div class="gallery-overlay">
                <span>Ampliar Foto</span>
            </div>
        </div>

        <div class="gallery-card">
            <img src="2.jpg" alt="Recuerdo 2">
            <div class="gallery-overlay">
                <span>Ampliar Foto</span>
            </div>
        </div>

        <div class="gallery-card">
            <img src="3.jpg" alt="Recuerdo 3">
            <div class="gallery-overlay">
                <span>Ampliar Foto</span>
            </div>
        </div>
    </div>

    <!-- Visor de pantalla completa (Lightbox) -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Foto Ampliada">
    </div>
</section>
