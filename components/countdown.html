<section class="countdown countdown-cinematic">
    <div class="cinematic-badge">PREMIERE EXCLUSIVA</div>
    <h2 class="cinematic-title">La Cuenta Regresiva</h2>
    <p class="cinematic-subtitle">21 DE NOVIEMBRE DE 2026</p>

    <div class="timer-cinematic">
        <div class="time-block">
            <div class="number-wrapper">
                <span id="days">00</span>
            </div>
            <span class="label">Días</span>
        </div>

        <span class="time-separator">:</span>

        <div class="time-block">
            <div class="number-wrapper">
                <span id="hours">00</span>
            </div>
            <span class="label">Horas</span>
        </div>

        <span class="time-separator">:</span>

        <div class="time-block">
            <div class="number-wrapper">
                <span id="minutes">00</span>
            </div>
            <span class="label">Minutos</span>
        </div>

        <span class="time-separator">:</span>

        <div class="time-block">
            <div class="number-wrapper">
                <span id="seconds">00</span>
            </div>
            <span class="label">Segundos</span>
        </div>
    </div>
</section>
