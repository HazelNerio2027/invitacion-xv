<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Digital</title>

    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Biblioteca de Animaciones AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Hojas de Estilo CSS -->
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">

    <!-- Scripts JS (Solo se cargan una vez aquí con defer) -->
    <script defer src="apps.js"></script>
    <script defer src="components.js"></script>
    <script defer src="countdown.js"></script>
</head>

<body>

    <!-- Contenedores dinámicos modularizados -->
    <div id="loader"></div>
    <div id="navbar"></div>
    <div id="hero"></div>
    <div id="welcome"></div>
    <div id="countdown"></div>
    <div id="story"></div>
    <div id="gallery"></div>
    <div id="timeline"></div>
    <div id="dresscode"></div>
    <div id="location"></div>
    <div id="rsvp"></div>
    <div id="footer"></div>

   <audio id="bgMusic" src="https://files.catbox.moe/abc123.mp3" loop preload="auto"></audio>

    <!-- Script de Animaciones AOS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            AOS.init({
                duration: 1200,
                once: true
            });
        });
    </script>

</body>
</html>
